<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CVMatch AI Pro 2026</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@v5/dist/tesseract.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #3b82f6;
            --success: #22c55e;
            --bg: #0f172a;
            --card: #1e2937;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e2937);
            color: #e2e8f0;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 960px; margin: 0 auto; }
        h1 { 
            text-align:center; 
            font-size:2.8rem; 
            background:linear-gradient(90deg,#60a5fa,#c4d0ff); 
            -webkit-background-clip:text; 
            -webkit-text-fill-color:transparent; 
        }
        .subtitle { text-align:center; color:#94a3b8; margin-bottom:30px; }
        .card {
            background: var(--card);
            border-radius: 20px;
            padding: 28px;
            margin-bottom: 24px;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.4);
        }
        button {
            padding: 14px 24px;
            font-weight: 600;
            border: none;
            border-radius: 12px;
            background: linear-gradient(90deg, var(--primary), #60a5fa);
            color: white;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        button:hover { opacity: 0.9; }
        .upload-zone, .linkedin-zone {
            border: 3px dashed #475569;
            border-radius: 16px;
            padding: 50px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        .upload-zone:hover, .linkedin-zone:hover { 
            border-color: var(--primary); 
            background: rgba(59,130,246,0.1); 
        }
        input[type="text"], textarea, select {
            width: 100%;
            padding: 14px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 12px;
            color: #e2e8f0;
            margin-top: 8px;
        }
        .resume-preview {
            background: white;
            color: #1e2937;
            padding: 40px;
            border-radius: 12px;
            line-height: 1.7;
            font-family: 'Georgia', serif;
            max-height: 720px;
            overflow-y: auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.25);
        }
    </style>
</head>
<body>

<div class="container">
    <h1>CVMatch AI Pro 2026</h1>
    <p class="subtitle">Smart Resume Analyzer + AI Resume Builder</p>

    <div class="card">
        <label style="font-weight:600; color:#94a3b8; display:block; margin-bottom:8px;">Target Role / Position</label>
        <input type="text" id="targetRole" placeholder="e.g. Senior Full Stack Engineer">
        <div style="margin-top:12px; font-size:0.9rem; color:#64748b;">
            Quick Fill: 
            <span onclick="quickFillRole('Senior Software Engineer')" style="cursor:pointer; text-decoration:underline;">Engineer</span> • 
            <span onclick="quickFillRole('Data Scientist')" style="cursor:pointer; text-decoration:underline;">Data Scientist</span>
        </div>
    </div>

    <div class="card">
        <div class="upload-zone" id="dropZone">
            <i class="fas fa-cloud-upload-alt" style="font-size:4rem; color:#64748b; margin-bottom:16px;"></i>
            <h3>Upload Resume PDF</h3>
            <input type="file" id="fileInput" accept="application/pdf" hidden>
        </div>
        <div id="fileName" style="text-align:center; margin-top:12px; color:#22c55e; font-weight:500; display:none;"></div>
    </div>

    <div class="card">
        <label style="font-weight:600; color:#94a3b8; display:block; margin-bottom:10px;">Job Description</label>
        <textarea id="jobDesc" placeholder="Paste the job description here..." rows="6"></textarea>
    </div>

    <button onclick="analyzeCV()" style="width:100%; padding:18px; font-size:1.15rem;">🚀 Run AI Analysis</button>

    <div id="loadingScreen" class="card" style="display:none; text-align:center;">
        <h3 id="loadingText">Processing...</h3>
    </div>

    <div id="results" class="card" style="display:none; text-align:center;">
        <button onclick="buildOptimizedResume()" style="background:#16a34a; padding:18px 40px; font-size:1.25rem;">
            <i class="fas fa-wand-magic-sparkles"></i> Build My Tailored Resume
        </button>
    </div>

    <div id="resumeBuilder" class="card" style="display:none;">
        <h2 style="margin-bottom:20px;">AI-Optimized Resume</h2>
        <div id="resumePreview" class="resume-preview" contenteditable="true"></div>
        <div style="margin-top:25px; display:flex; gap:12px; flex-wrap:wrap;">
            <button onclick="exportResumePDF()" style="background:#1e40af;">📄 Download PDF</button>
            <button onclick="hideBuilder()" style="background:#334155;">Close</button>
        </div>
    </div>
</div>

<script>
    let resumeText = "";
    let currentTargetRole = "";

    // Fix ReferenceError by waiting for DOM and Libraries to load
    document.addEventListener('DOMContentLoaded', () => {
        if (typeof pdfjsLib !== 'undefined') {
            pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        }
    });

    document.getElementById('dropZone').onclick = () => document.getElementById('fileInput').click();
    
    document.getElementById('fileInput').onchange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        document.getElementById('fileName').style.display = 'block';
        document.getElementById('fileName').innerText = `✅ ${file.name}`;
        
        document.getElementById('loadingScreen').style.display = 'block';
        document.getElementById('loadingText').innerText = "Extracting text from PDF...";
        resumeText = await extractTextWithOCR(file);
        document.getElementById('loadingScreen').style.display = 'none';
    };

    async function extractTextWithOCR(file) {
        try {
            const arrayBuffer = await file.arrayBuffer();
            const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
            let text = "";
            for (let i = 1; i <= pdf.numPages; i++) {
                const page = await pdf.getPage(i);
                const content = await page.getTextContent();
                text += content.items.map(item => item.str).join(" ") + "\n";
            }
            if (text.trim().length > 100) return text.trim();
        } catch (e) { console.error("PDF.js failed, using Tesseract..."); }
        
        const { data } = await Tesseract.recognize(file, 'eng');
        return data.text.trim();
    }

    function quickFillRole(role) {
        document.getElementById('targetRole').value = role;
    }

    async function analyzeCV() {
        currentTargetRole = document.getElementById('targetRole').value.trim();
        if (!resumeText || !currentTargetRole) return alert("Please upload a resume and enter a role.");
        
        document.getElementById('results').style.display = 'block';
        document.getElementById('results').scrollIntoView({ behavior: 'smooth' });
    }

    async function buildOptimizedResume() {
        const jobDesc = document.getElementById('jobDesc').value.trim();
        document.getElementById('resumeBuilder').style.display = 'block';
        document.getElementById('resumePreview').innerHTML = "Writing your resume...";

        const prompt = `Rewrite this resume for the role of ${currentTargetRole} based on this job description: ${jobDesc}. Original text: ${resumeText}. Format as clean HTML.`;

        try {
            const response = await fetch("/api/generate", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ prompt: prompt })
            });
            const data = await response.json();
            const htmlResult = data.candidates[0].content.parts[0].text.replace(/```html|```/g, "");
            document.getElementById('resumePreview').innerHTML = htmlResult;
        } catch (error) {
            document.getElementById('resumePreview').innerHTML = "Error generating resume. Check Vercel Logs.";
        }
    }

    async function exportResumePDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF({ format: "a4", unit: "pt" });
        const text = document.getElementById('resumePreview').innerText;
        const lines = doc.splitTextToSize(text, 500);
        doc.setFontSize(11);
        doc.text(lines, 40, 50);
        doc.save("Optimized_Resume.pdf");
    }

    function hideBuilder() {
        document.getElementById('resumeBuilder').style.display = 'none';
    }
</script>
</body>
</html>
